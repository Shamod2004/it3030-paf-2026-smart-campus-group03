# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── XAMPP MySQL ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=SmartCampusSecretKey2026SuperLongSecretForHMAC512Algorithm!
jwt.expiration=86400000

# ─── Google OAuth2 ────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ─── Frontend URL (used in OAuth2 redirect) ───────────────────────────────────
app.frontend-url=http://localhost:3000

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ─── Swagger ──────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
