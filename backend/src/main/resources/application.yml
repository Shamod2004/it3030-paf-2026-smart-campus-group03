spring:
  application:
    name: Smart Campus Backend

  datasource:
    url: jdbc:mysql://localhost:3306/paf?useSSL=false&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  mvc:
    cors:
      allowed-origins: http://localhost:3000
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

server:
  port: 8081
  servlet:
    context-path: /

logging:
  level:
    root: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    com.smartcampus: INFO
